# Operator CRM backend: Postgres + API in one stack.
# Copy .env.docker.example → .env.docker, fill it in, then simply:
#   docker compose up -d --build
#
# No ${} interpolation on purpose: every value flows through env_file into the
# containers (the entrypoint derives DATABASE_URL from POSTGRES_PASSWORD), so
# no --env-file flag or shell exports are ever needed.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Provides POSTGRES_PASSWORD (postgres ignores the unrelated app vars).
    env_file: .env.docker
    environment:
      POSTGRES_DB: operator_crm
      POSTGRES_USER: operator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U operator -d operator_crm']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    env_file: .env.docker
    environment:
      # Compose-network DB host; the entrypoint builds DATABASE_URL from these
      # + POSTGRES_PASSWORD unless a full DATABASE_URL is set in .env.docker.
      DB_HOST: db
    ports:
      - '5003:5003'
    volumes:
      # Local-disk document storage (only used when R2 isn't configured).
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
